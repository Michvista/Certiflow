services:
  postgres-compliance:
    image: postgres:15-alpine
    container_name: certiflow-compliance-db
    environment:
      POSTGRES_USER: certiflow
      POSTGRES_PASSWORD: certiflow_password
      POSTGRES_DB: compliance_db
    ports:
      - "5433:5432"
    volumes:
      - compliance_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U certiflow -d compliance_db"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - certiflow-network

  redis:
    image: redis:7-alpine
    container_name: certiflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - certiflow-network

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-gateway
    container_name: certiflow-gateway
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      COMPLIANCE_SERVICE_URL: http://compliance-service:3001
      AI_WORKER_URL: http://ai-worker:3002
      JWT_SECRET: ${JWT_SECRET}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 12
    depends_on:
      compliance-service:
        condition: service_healthy
      ai-worker:
        condition: service_started
    networks:
      - certiflow-network
    develop:
      watch:
        - action: rebuild
          path: ./api-gateway/src
        - action: rebuild
          path: ./api-gateway/package.json
        - action: rebuild
          path: ./shared/src

  compliance-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: compliance-service
    container_name: certiflow-compliance
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgresql://certiflow:certiflow_password@postgres-compliance:5432/compliance_db}
      REDIS_URL: ${COMPOSE_REDIS_URL:-redis://redis:6379}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      JWT_SECRET: ${JWT_SECRET}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 24
    depends_on:
      postgres-compliance:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - certiflow-network
    develop:
      watch:
        - action: rebuild
          path: ./services/compliance-service/src
        - action: rebuild
          path: ./services/compliance-service/prisma
        - action: rebuild
          path: ./services/compliance-service/package.json
        - action: rebuild
          path: ./shared/src

  ai-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: ai-worker
    container_name: certiflow-ai-worker
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      REDIS_URL: ${COMPOSE_REDIS_URL:-redis://redis:6379}
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgresql://certiflow:certiflow_password@postgres-compliance:5432/compliance_db}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OCR_PROVIDER: ${OCR_PROVIDER:-google-vision}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS}
      GOOGLE_APPLICATION_CREDENTIALS_JSON: ${GOOGLE_APPLICATION_CREDENTIALS_JSON}
      GOOGLE_CLOUD_QUOTA_PROJECT: ${GOOGLE_CLOUD_QUOTA_PROJECT}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}
      SMTP_URL: ${SMTP_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      MAIL_FROM: ${MAIL_FROM}
    depends_on:
      postgres-compliance:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - certiflow-network
    develop:
      watch:
        - action: rebuild
          path: ./services/ai-worker/src
        - action: rebuild
          path: ./services/ai-worker/package.json
        - action: rebuild
          path: ./shared/src

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: certiflow-frontend
    ports:
      - "5173:5173"
    environment:
      PUBLIC_API_BASE_URL: http://localhost:3000/api
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - certiflow-network
    develop:
      watch:
        - action: rebuild
          path: ./frontend/src
        - action: rebuild
          path: ./frontend/static
        - action: rebuild
          path: ./frontend/package.json
        - action: rebuild
          path: ./shared/src

volumes:
  compliance_data:
  redis_data:

networks:
  certiflow-network:
    driver: bridge
