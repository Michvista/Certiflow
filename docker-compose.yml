services:
  postgres-compliance:
    image: postgres:15-alpine
    container_name: certiflow-compliance-db
    environment:
      POSTGRES_USER: certiflow
      POSTGRES_PASSWORD: certiflow_password
      POSTGRES_DB: compliance_db
    ports:
      - "5433:5432"
    volumes:
      - compliance_data:/var/lib/postgresql/data
    networks:
      - certiflow-network

  redis:
    image: redis:7-alpine
    container_name: certiflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - certiflow-network

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: certiflow-gateway
    working_dir: /app
    command: sh -c "npm run build --workspace=shared && npm run dev --workspace=api-gateway"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      COMPLIANCE_SERVICE_URL: http://compliance-service:3001
      AI_WORKER_URL: http://ai-worker:3002
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - compliance-service
      - ai-worker
    networks:
      - certiflow-network
    develop:
      watch:
        - action: sync
          path: ./api-gateway/src
          target: /app/api-gateway/src
        - action: rebuild
          path: ./api-gateway/package.json
        - action: rebuild
          path: ./shared/src

  compliance-service:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: certiflow-compliance
    working_dir: /app
    command: sh -c "npm run build --workspace=shared && npm run prisma:generate --workspace=services/compliance-service && npm run dev --workspace=services/compliance-service"
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgresql://certiflow:certiflow_password@postgres-compliance:5432/compliance_db}
      REDIS_URL: ${COMPOSE_REDIS_URL:-redis://redis:6379}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - postgres-compliance
      - redis
    networks:
      - certiflow-network
    develop:
      watch:
        - action: sync
          path: ./services/compliance-service/src
          target: /app/services/compliance-service/src
        - action: sync
          path: ./services/compliance-service/prisma
          target: /app/services/compliance-service/prisma
        - action: rebuild
          path: ./services/compliance-service/package.json
        - action: rebuild
          path: ./shared/src

  ai-worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: certiflow-ai-worker
    working_dir: /app
    command: sh -c "npm run build --workspace=shared && npm run dev --workspace=services/ai-worker"
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
      REDIS_URL: ${COMPOSE_REDIS_URL:-redis://redis:6379}
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgresql://certiflow:certiflow_password@postgres-compliance:5432/compliance_db}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OCR_PROVIDER: ${OCR_PROVIDER:-google-vision}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS}
      GOOGLE_APPLICATION_CREDENTIALS_JSON: ${GOOGLE_APPLICATION_CREDENTIALS_JSON}
    depends_on:
      - redis
    networks:
      - certiflow-network
    develop:
      watch:
        - action: sync
          path: ./services/ai-worker/src
          target: /app/services/ai-worker/src
        - action: rebuild
          path: ./services/ai-worker/package.json
        - action: rebuild
          path: ./shared/src

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: certiflow-frontend
    working_dir: /app
    command: sh -c "npm run build --workspace=shared && npm run dev --workspace=frontend -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      PUBLIC_API_BASE_URL: http://localhost:3000/api
    depends_on:
      - api-gateway
    networks:
      - certiflow-network
    develop:
      watch:
        - action: sync
          path: ./frontend/src
          target: /app/frontend/src
        - action: rebuild
          path: ./frontend/package.json
        - action: rebuild
          path: ./shared/src

volumes:
  compliance_data:
  redis_data:

networks:
  certiflow-network:
    driver: bridge
